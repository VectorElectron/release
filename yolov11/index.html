<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>纯前端YOLOV11演示</title>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.19.0/dist/ort.min.js"></script>

    <link rel="preload" href="https://cdn.jsdelivr.net/gh/VectorElectron/release@main/yolov11/yolov11_dict.txt" as="fetch" crossorigin="anonymous">
    <link rel="preload" href="https://cdn.jsdelivr.net/gh/VectorElectron/release@main/yolov11/yolo11n_one.onnx" as="fetch" crossorigin="anonymous">

    <style>
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            display: flex; 
            flex-direction: column; 
            background: #121212; 
            color: white; 
            padding: 0; 
            margin: 0;
            height: 100vh;
            align-items: center;
        }

        .main-container {
            width: 100%;
            max-width: 600px;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #1a1a1a;
            position: relative;
        }

        /* 固定标题 */
        header {
            padding: 15px;
            text-align: center;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            z-index: 10;
        }
        h3 { margin: 0; font-size: 1.1em; letter-spacing: 1px; }

        /* 中间滚动图片区 */
        .top-content {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-overflow-scrolling: touch;
        }

        .canvas-container { 
            position: relative; 
            width: 100%; 
            background: #000;
            border-radius: 4px;
        }
        #displayImage { width: 100%; height: auto; display: block; }
        #overlay { position: absolute; top: 0; left: 0; pointer-events: none; }

        /* 底部固定控制区 */
        .bottom-controls {
            background: #252525;
            padding: 12px 15px calc(12px + env(safe-area-inset-bottom));
            border-top: 1px solid #333;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .log-row {
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: #00ff00;
            text-align: center;
            background: rgba(0,0,0,0.5);
            padding: 5px;
            border-radius: 4px;
        }

        /* 选项组：隐藏文字，仅保留圆点 */
        .dial-group {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 5px 0;
        }
        .dial-item {
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        .dial-item input {
            width: 18px;
            height: 18px;
            margin: 0;
            cursor: pointer;
        }

        .btn-group { display: flex; gap: 10px; }
        .btn-group button, .btn-group label {
            flex: 1;
            padding: 14px 0;
            cursor: pointer;
            font-weight: bold;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            text-align: center;
        }
        button:disabled { background: #444; color: #888; }
        .btn-example { background: #495057 !important; }
        .btn-run { background: #d9534f !important; } 
        
        #upload { display: none; }
        #status { font-size: 11px; color: #888; text-align: center; }
    </style>
</head>
<body>

    <div class="main-container">
        <header>
            <h3>YOLOv11 目标检测</h3>
        </header>

        <div class="top-content">
            <div class="canvas-container" id="container">
                <img id="displayImage">
                <canvas id="overlay"></canvas>
            </div>
        </div>

        <div class="bottom-controls">
            <div id="status">等待引擎加载...</div>

            <div class="log-row" id="metrics-line">
                Ready
            </div>

            <div class="dial-group">
                <label class="dial-item"><input type="radio" name="dial" value="320"> 320</label>
                <label class="dial-item"><input type="radio" name="dial" value="640" checked> 640</label>
                <label class="dial-item"><input type="radio" name="dial" value="960"> 960</label>
                <label class="dial-item"><input type="radio" name="dial" value="1280"> 1280</label>
            </div>

            <div class="btn-group">
                <button class="btn-example" id="exampleBtn">示例</button>
                <label for="upload">上传</label>
                <input type="file" id="upload" accept="image/*">
                <button class="btn-run" id="runBtn" disabled>检测</button>
            </div>
        </div>
    </div>

<script>
    const upload = document.getElementById('upload');
    const runBtn = document.getElementById('runBtn');
    const exampleBtn = document.getElementById('exampleBtn');
    const img = document.getElementById('displayImage');
    const canvas = document.getElementById('overlay');
    const status = document.getElementById('status');
    const metricsLine = document.getElementById('metrics-line');

    let sessions = {};
    let classNames = [];

    async function init() {
        try {
            const response = await fetch('https://cdn.jsdelivr.net/gh/VectorElectron/release@main/yolov11/yolov11-dic80.txt');
            const text = await response.text();
            classNames = text.split('\n').map(line => line.trim()).filter(line => line !== "");
            const gpuOpt = { executionProviders: ['wasm'] };
            status.innerText = "正在初始化端到端引擎...";
            sessions.full = await ort.InferenceSession.create('https://cdn.jsdelivr.net/gh/VectorElectron/release@main/yolov11/yolo11n_one.onnx', gpuOpt);

            status.innerText = "准备就绪";
            runBtn.disabled = false;
        } catch (e) {
            status.innerText = "初始化失败: " + e.message;
        }
    }

    function render(boxes, scores, clss) {
        canvas.width = img.width;
        canvas.height = img.height;
        canvas.style.left = img.offsetLeft + "px"; 

        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const scaleX = canvas.width / img.naturalWidth;
        const scaleY = canvas.height / img.naturalHeight;

        ctx.font = "10px sans-serif";
        ctx.textBaseline = "top";

        for (let i = 0; i < scores.length; i++) {
            if (scores[i] < 0.25) continue;
            
            const x = boxes[i * 4] * scaleX;
            const y = boxes[i * 4 + 1] * scaleY;
            const w = (boxes[i * 4 + 2] - boxes[i * 4]) * scaleX;
            const h = (boxes[i * 4 + 3] - boxes[i * 4 + 1]) * scaleY;

            // 红色框 (1px)
            ctx.strokeStyle = '#ff0000';
            ctx.lineWidth = 1;
            ctx.strokeRect(x, y, w, h);
            
            // 标签文字
            const label = `${classNames[clss[i]] || clss[i]} ${(scores[i]*100).toFixed(0)}%`;
            const textWidth = ctx.measureText(label).width;

            // 内部左上角红色背景
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(x, y, textWidth + 4, 12);

            // 白色文字
            ctx.fillStyle = '#ffffff';
            ctx.fillText(label, x + 2, y);
        }
    }

    async function predict() {
        if (!img.src || !img.complete) return;
        
        const selectedDial = document.querySelector('input[name="dial"]:checked').value;
        const dialParam = Math.round(selectedDial * 1.414);

        status.innerText = "正在检测 (E2E)...";
        try {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = img.naturalWidth;
            tempCanvas.height = img.naturalHeight;
            const ctx = tempCanvas.getContext('2d');
            ctx.drawImage(img, 0, 0);
            const imageData = ctx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
            
            // 预处理：构造原始 RGB 数据
            const rgbData = new Uint8Array(tempCanvas.width * tempCanvas.height * 3);
            for (let i = 0; i < imageData.data.length / 4; i++) {
                rgbData[i * 3]     = imageData.data[i * 4];     // R
                rgbData[i * 3 + 1] = imageData.data[i * 4 + 1]; // G
                rgbData[i * 3 + 2] = imageData.data[i * 4 + 2]; // B
            }

            const tStart = performance.now();
            
            // 构造统一的输入字典（注意前缀需要与 Python 合并脚本中的 add_prefix 对应）
            const inputs = {
                'res_image': new ort.Tensor('uint8', rgbData, [tempCanvas.height, tempCanvas.width, 3]),
                'res_dial': new ort.Tensor('int32', Int32Array.from([dialParam]), []),
                'nms_conf_thr': new ort.Tensor('float32', Float32Array.from([0.25]), []),
                'nms_iou_thr': new ort.Tensor('float32', Float32Array.from([0.45]), []),
                'nms_top_k': new ort.Tensor('int32', Int32Array.from([300]), [])
            };

            // 单次执行
            const results = await sessions.full.run(inputs);
            const tEnd = performance.now();

            // 获取输出（注意输出名也可能带有 nms_ 前缀，取决于合并时的设置）
            // 建议通过 sessions.full.outputNames 查看具体的 Key
            const boxes = results.nms_boxes || results[sessions.full.outputNames[0]];
            const scores = results.nms_scores || results[sessions.full.outputNames[1]];
            const clss = results.nms_clss || results[sessions.full.outputNames[2]];

            metricsLine.innerText = `E2E Total: ${(tEnd - tStart).toFixed(0)}ms`;
            status.innerText = "完成";
            
            render(boxes.data, scores.data, clss.data);
        } catch (e) {
            console.error(e);
            status.innerText = "报错: " + e.message;
        }
    }

    upload.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            img.src = URL.createObjectURL(file);
            img.onload = () => {
                canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
                status.innerText = "图片已载入";
            };
        }
    };

    exampleBtn.onclick = () => {
        img.src = `testimg.png`;
        img.onload = () => {
            canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
            status.innerText = "示例已载入";
        };
    };

    runBtn.onclick = predict;
    init();
</script>
</body>
</html>
