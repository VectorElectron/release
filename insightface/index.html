<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>人脸检测+特征提取</title>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.19.0/dist/ort.min.js"></script>
    <style>
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            display: flex; 
            flex-direction: column; 
            background: #121212; 
            color: white; 
            padding: 0; 
            margin: 0;
            height: 100vh;
            align-items: center;
        }

        .main-container {
            width: 100%;
            max-width: 600px;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #1a1a1a;
            position: relative;
        }

        header {
            padding: 15px;
            text-align: center;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            z-index: 10;
        }
        h3 { margin: 0; font-size: 1.1em; letter-spacing: 1px; }

        .top-content {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-overflow-scrolling: touch;
            background: #000;
        }

        .canvas-container { 
            position: relative; 
            width: 100%; 
            border-radius: 4px;
        }
        #displayImage { width: 100%; height: auto; display: block; }
        #overlay { position: absolute; top: 0; left: 0; pointer-events: none; }

        .bottom-controls {
            background: #252525;
            padding: 12px 15px calc(12px + env(safe-area-inset-bottom));
            border-top: 1px solid #333;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .log-row {
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: #00ff00;
            text-align: center;
            background: rgba(0,0,0,0.5);
            padding: 5px;
            border-radius: 4px;
        }

        .btn-group { display: flex; gap: 10px; }
        .btn-group button, .btn-group label {
            flex: 1;
            padding: 14px 0;
            cursor: pointer;
            font-weight: bold;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            text-align: center;
        }
        button:disabled { background: #444; color: #888; }
        .btn-example { background: #495057 !important; }
        .btn-run { background: #28a745 !important; } 
        
        #upload { display: none; }
        #status { font-size: 11px; color: #888; text-align: center; }
    </style>
</head>
<body>

    <div class="main-container">
        <header>
            <h3>SCRFD 106点人脸检测</h3>
        </header>

        <div class="top-content">
            <div class="canvas-container" id="container">
                <img id="displayImage">
                <canvas id="overlay"></canvas>
            </div>
        </div>

        <div class="bottom-controls">
            <div id="status">正在加载模型...</div>

            <div class="log-row" id="metrics-line">
                Ready
            </div>

            <div class="btn-group">
                <button class="btn-example" id="exampleBtn">示例</button>
                <label for="upload">上传</label>
                <input type="file" id="upload" accept="image/*">
                <button class="btn-run" id="runBtn" disabled>检测</button>
            </div>
        </div>
    </div>

<script>
    const img = document.getElementById('displayImage');
    const canvas = document.getElementById('overlay');
    const status = document.getElementById('status');
    const metricsLine = document.getElementById('metrics-line');
    const runBtn = document.getElementById('runBtn');
    const upload = document.getElementById('upload');
    const exampleBtn = document.getElementById('exampleBtn');
    
    let sessions = {};

    async function init() {
        try {
            const opt = { executionProviders: ['wasm'] };
            status.innerText = "正在初始化引擎...";
            sessions.res = await ort.InferenceSession.create('https://cdn.jsdelivr.net/gh/VectorElectron/release@main/insightface/scrfd_resize.onnx', opt);
            sessions.det = await ort.InferenceSession.create('https://cdn.jsdelivr.net/gh/VectorElectron/release@main/insightface/scrfd_500m_bnkps.onnx', opt);
            sessions.cat = await ort.InferenceSession.create('https://cdn.jsdelivr.net/gh/VectorElectron/release@main/insightface/scrfd_concat.onnx', opt);
            sessions.nms = await ort.InferenceSession.create('https://cdn.jsdelivr.net/gh/VectorElectron/release@main/insightface/scrfd_nms.onnx', opt);
            sessions.aln = await ort.InferenceSession.create('https://cdn.jsdelivr.net/gh/VectorElectron/release@main/insightface/box_aligner.onnx', opt);
            sessions.key = await ort.InferenceSession.create('https://cdn.jsdelivr.net/gh/VectorElectron/release@main/insightface/2d106det.onnx', opt);
            sessions.inv = await ort.InferenceSession.create('https://cdn.jsdelivr.net/gh/VectorElectron/release@main/insightface/keypoint_inv.onnx', opt);

            status.innerText = "准备就绪";
            runBtn.disabled = false;
        } catch (e) {
            status.innerText = "初始化失败: " + e.message;
        }
    }

    async function predict() {
        if (!img.src || !img.complete) return;
        
        status.innerText = "正在推理...";
        const tStartTotal = performance.now();

        try {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = img.naturalWidth;
            tempCanvas.height = img.naturalHeight;
            const tCtx = tempCanvas.getContext('2d');
            tCtx.drawImage(img, 0, 0);
            const imageData = tCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
            const rgb = new Uint8Array(tempCanvas.width * tempCanvas.height * 3);
            for (let i = 0; i < imageData.data.length / 4; i++) {
                rgb[i*3] = imageData.data[i*4];
                rgb[i*3+1] = imageData.data[i*4+1];
                rgb[i*3+2] = imageData.data[i*4+2];
            }

            const origImgTensor = new ort.Tensor('uint8', rgb, [tempCanvas.height, tempCanvas.width, 3]);

            // --- 检测阶段 (Detection) ---
            const tDetStart = performance.now();
            const resOut = await sessions.res.run({
                'image': origImgTensor,
                'dial': new ort.Tensor('int32', Int32Array.from([1024]), [])
            });
            const imgf = resOut[sessions.res.outputNames[0]];
            const scale = resOut[sessions.res.outputNames[1]];

            const detOut = await sessions.det.run({ 'input.1': imgf });
            
            const dNames = sessions.det.outputNames;
            const catInputs = {
                's8': detOut[dNames[0]], 's16': detOut[dNames[1]], 's32': detOut[dNames[2]],
                'b8': detOut[dNames[3]], 'b16': detOut[dNames[4]], 'b32': detOut[dNames[5]],
                'k8': detOut[dNames[6]], 'k16': detOut[dNames[7]], 'k32': detOut[dNames[8]],
                'fh': new ort.Tensor('int64', BigInt64Array.from([BigInt(imgf.dims[2])]), []),
                'fw': new ort.Tensor('int64', BigInt64Array.from([BigInt(imgf.dims[3])]), [])
            };
            const merged = await sessions.cat.run(catInputs);

            const nmsOut = await sessions.nms.run({
                'merged_out': merged[sessions.cat.outputNames[0]],
                'scale': scale,
                'conf_thr': new ort.Tensor('float32', Float32Array.from([0.5]), []),
                'iou_thr': new ort.Tensor('float32', Float32Array.from([0.3]), []),
                'top_k': new ort.Tensor('int32', Int32Array.from([100]), [])
            });

            const boxes = nmsOut['boxes'];
            const scores = nmsOut['scores'];
            const tDetEnd = performance.now();

            // --- 关键点阶段 (Landmarks) ---
            let pts106_final = null;
            let tKptTime = 0;

            if (scores.dims[0] > 0) {
                const tKptStart = performance.now();
                const numFaces = scores.dims[0];

                const alnOut = await sessions.aln.run({
                    'img': origImgTensor, 
                    'boxes': boxes
                });

                const keyOut = await sessions.key.run({
                    'data': alnOut[sessions.aln.outputNames[0]]
                });

                const ptsRawData = keyOut[sessions.key.outputNames[0]].data;
                const ptsReshaped = new ort.Tensor(
                    'float32', 
                    Float32Array.from(ptsRawData), 
                    [numFaces, 106, 2]
                );

                const invOut = await sessions.inv.run({
                    'pts_norm': ptsReshaped, 
                    'boxes': boxes
                });
                pts106_final = invOut[sessions.inv.outputNames[0]].data;
                tKptTime = performance.now() - tKptStart;
            }

            metricsLine.innerText = `Det: ${(tDetEnd - tDetStart).toFixed(0)}ms | Kpt: ${tKptTime.toFixed(0)}ms | Faces: ${scores.dims[0]}`;
            render(boxes.data, scores.data, pts106_final);
            status.innerText = "完成";
        } catch (e) {
            console.error(e);
            status.innerText = "报错: " + e.message;
        }
    }

    function render(boxes, scores, pts106) {
        canvas.width = img.width;
        canvas.height = img.height;
        canvas.style.left = img.offsetLeft + "px"; 

        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const sx = canvas.width / img.naturalWidth;
        const sy = canvas.height / img.naturalHeight;

        for (let i = 0; i < scores.length; i++) {
            if (scores[i] < 0.5) continue;
            
            const x1 = boxes[i*4] * sx, y1 = boxes[i*4+1] * sy;
            const x2 = boxes[i*4+2] * sx, y2 = boxes[i*4+3] * sy;
            
            // 绿色框
            ctx.strokeStyle = '#00ff00';
            ctx.lineWidth = 1.5;
            ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);

            if (pts106) {
                ctx.fillStyle = '#ff0000';
                for (let k = 0; k < 106; k++) {
                    const px = pts106[i*212 + k*2] * sx;
                    const py = pts106[i*212 + k*2 + 1] * sy;
                    ctx.beginPath();
                    ctx.arc(px, py, 1.2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }
    }

    // 清除画布的通用方法
    function resetCanvas() {
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        metricsLine.innerText = "Ready";
    }

    upload.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            img.src = URL.createObjectURL(file);
            img.onload = () => {
                resetCanvas();
                status.innerText = "图片已载入";
            };
        }
    };

    exampleBtn.onclick = () => {
        img.src = 'gdp.jpg'; // 请确保此路径正确
        img.onload = () => {
            resetCanvas();
            status.innerText = "示例已载入";
        };
    };

    runBtn.onclick = predict;
    init();
</script>
</body>
</html>
